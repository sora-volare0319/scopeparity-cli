    url: https://github.com/sora-volare0319/scopeparity/security/advisories/new
    about: Do not disclose a suspected vulnerability in a public issue.
  - name: Share optional scan feedback
    url: https://github.com/sora-volare0319/scopeparity/issues/new?template=scan-feedback.yml
